name: CI

on:
  push:
    branches:
      - main

jobs:
  version-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check version bump
        run: |
          current_version=$(cat VERSION)
          
          # Get the previous commit's version
          previous_version=$(git show HEAD^:VERSION 2>/dev/null || echo "")
          
          if [ "$current_version" = "$previous_version" ]; then
            echo "ERROR: Version not bumped! Current: $current_version, Previous: $previous_version"
            exit 1
          fi
          
          echo "Version bumped from $previous_version to $current_version"
